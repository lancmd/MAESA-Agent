interface:
  display_name: "Mining Area Ecological Workflow"
  short_description: "Execute local mining-area GIS workflows"
  default_prompt: "Use $mining-area-ecological-space-analysis to inspect local mining-area data, select available adapters, execute the workflow, validate outputs, and return artifacts."
dependencies:
  tools:
    - type: "mcp"
      value: "mining-gis"
      description: "Local ArcGIS, ENVI, PyTorch, PLUS, and InVEST execution service"
      transport: "streamable_http"
      url: "http://127.0.0.1:8765/mcp"
policy:
  allow_implicit_invocation: false
